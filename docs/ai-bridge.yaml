  # ── Phase 2 ────────────────────────────────
  /api/v1/ai/enrich-task:
    post:
      tags: [Task Enrichment]
      summary: Поставить задачу обогащения в очередь (Фаза 2, async)
      description: |
        Принимает задачу, немедленно ставит её в очередь Celery и возвращает
        202 с jobId. Обогащение происходит в фоне.

        По завершении AI Service делает POST на `callbackUrl` с телом
        `EnrichTaskCallback`. Core API принимает результат, сохраняет
        enrichment и пушит обновление фронту через WebSocket.

        **Флоу Фазы 2:**
        1. Core API вызывает этот эндпоинт для каждой задачи сразу после
           создания скелета (все вызовы параллельно, не ждут друг друга)
        2. AI Service обрабатывает задачи независимо по мере освобождения воркеров
        3. Каждый результат прилетает на callbackUrl индивидуально
        4. Core API обновляет enrichmentStatus узла и пушит WebSocket-событие
        5. Когда все задачи обогащены — enrichmentStatus проекта → COMPLETED
      operationId: enrichTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichTaskRequest"
      responses:
        "202":
          description: Задача принята в очередь
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichTaskJobResponse"
        "400":
          description: Ошибка валидации или отсутствует apiKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Невалидный X-Internal-Secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Очередь Celery недоступна
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

