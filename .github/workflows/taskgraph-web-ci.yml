name: Deploy Frontend (Docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_USERNAME: "deployuser"
  TARGET_DIR: "/home/deployuser/tsu-taskgraph-web"
  DOCKER_IMAGE: "${{ secrets.DOCKER_USERNAME }}/tsu-taskgraph-web"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
          build-args: |
            VITE_API_URL=https://taskgraph.orexi4.ru
            VITE_FARO_URL=${{ secrets.VITE_FARO_URL }}

      - name: 📁 Copy compose file to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME || env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "${{ env.TARGET_DIR }}/"

      - name: 🚀 Deploy to Server (SSH)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME || env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.TARGET_DIR }}
            
            echo "🔐 Generating .env file..."
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            
            echo "📥 Pulling latest images..."
            docker compose -f docker-compose.prod.yaml pull
            
            echo "🚀 Starting frontend container..."
            docker compose -f docker-compose.prod.yaml up -d
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f

      - name: 🛠 Rollback on Failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME || env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "⚠️ Deployment error. Rolling back to running config..."
            cd ${{ env.TARGET_DIR }}
            docker compose -f docker-compose.prod.yaml up -d
